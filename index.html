<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Korean Name</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:800px;
  margin:30px auto;
  padding:20px;
}

.card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin:8px 0;
}

button{
  cursor:pointer;
}

canvas{
  border:1px solid #ccc;
  background:#f8f1df;
  max-width:100%;
  margin-top:15px;
}

.result{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>🇰🇷 Find Your Korean Name</h1>

<input
 id="name"
 placeholder="Enter your name (ex. Michael)"
>

<label>Gender</label>

<select id="gender">
  <option value="male">Male</option>
  <option value="female">Female</option>
  <option value="random">Surprise Me</option>
</select>

<button onclick="generateName()">
Generate My Korean Name
</button>

<div id="result" class="result"></div>

<canvas id="card" width="700" height="400"></canvas>

</div>

<script>

const GEMINI_API_KEY = "";
  
const maleNames = [convertToHangul()]
  const femaleNames = [convertToHangul()]

async function askGemini(name){

 const prompt = `
You are a Korean naming expert.

Foreign Name: ${name}

Return JSON only.

{
  "hangul":"",
  "koreanName":"",
  "meaning":""
 }
 `;

 const response = await fetch(
   `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
   {
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify({
       contents:[
         {
           parts:[
             {
               text:prompt
             }
           ]
         }
       ]
     })
   }
 );

 return await response.json();
}
                   
 {name:"민준", meaning:"총명하고 뛰어난 사람"},
 {name:"서준", meaning:"밝고 따뜻한 리더"},
 {name:"도윤", meaning:"올바른 마음을 가진 사람"},
 {name:"지호", meaning:"지혜롭고 큰 뜻을 품은 사람"},
 {name:"하준", meaning:"넓은 마음을 가진 사람"},
 {name:"시우", meaning:"창의적이고 용감한 사람"},
 {name:"건우", meaning:"건강하고 강인한 사람"},
 {name:"현우", meaning:"현명하고 우수한 사람"}
];

const femaleNames = [
 {name:"서연", meaning:"아름답고 지혜로운 사람"},
 {name:"지우", meaning:"슬기롭고 따뜻한 사람"},
 {name:"하린", meaning:"맑고 순수한 사람"},
 {name:"예은", meaning:"은혜롭고 우아한 사람"},
 {name:"수빈", meaning:"총명하고 밝은 사람"},
 {name:"채원", meaning:"재능이 풍부한 사람"},
 {name:"유진", meaning:"귀하고 소중한 사람"},
 {name:"다은", meaning:"많은 사랑을 받는 사람"}
];

function hashCode(str){
 let h=0;

 for(let i=0;i<str.length;i++){
   h=((h<<5)-h)+str.charCodeAt(i);
   h|=0;
 }

 return Math.abs(h);
}

function convertToHangul(name){

 const dict={

   "michael":"마이클",
   "sara":"사라",
   "sarah":"사라",
   "emma":"엠마",
   "james":"제임스",
   "john":"존",
   "david":"데이비드",
   "daniel":"다니엘",
   "alex":"알렉스",
   "anna":"안나",
   "olivia":"올리비아",
   "lucas":"루카스",
   "ethan":"이선",
   "jack":"잭",
   "leo":"레오"

 };

const lower = name.toLowerCase();

 // 1순위 : 실제 이름 사전
 if(dict[lower]){
   return dict[lower];
 }

 // 2순위 : 자동 음차
 let result = lower;

 const rules = [
   ["ph","프"],
   ["ch","치"],
   ["sh","시"],
   ["th","스"],
   ["ck","크"],
   ["qu","쿠"],

   ["a","아"],
   ["b","브"],
   ["c","크"],
   ["d","드"],
   ["e","에"],
   ["f","프"],
   ["g","그"],
   ["h","하"],
   ["i","이"],
   ["j","제"],
   ["k","크"],
   ["l","르"],
   ["m","므"],
   ["n","느"],
   ["o","오"],
   ["p","프"],
   ["q","쿠"],
   ["r","르"],
   ["s","스"],
   ["t","트"],
   ["u","우"],
   ["v","브"],
   ["w","우"],
   ["x","크스"],
   ["y","이"],
   ["z","즈"]
 ];

 rules.forEach(rule=>{
   result = result.replaceAll(rule[0], rule[1]);
 });

 result = result
   .replace(/르르/g,"르")
   .replace(/느느/g,"느")
   .replace(/아아/g,"아")
   .replace(/에에/g,"에");

 return result;
}


async function generateName(){

 const input=document.getElementById("name").value.trim();
 const ai = await askGemini(input);

console.log(ai);

 if(!input){
   alert("Please enter your name");
   return;
 }

 const gender=document.getElementById("gender").value;

 const hash=hashCode(input);

 const hangulName=convertToHangul(input);

 let db;

 if(gender==="male"){
   db=maleNames;
 }
 else if(gender==="female"){
   db=femaleNames;
 }
 else{
   db=(hash % 2 === 0)
      ? maleNames
      : femaleNames;
 }

 const result=db[hash % db.length];

 document.getElementById("result").innerHTML=`
 <p><b>Original Name:</b> ${input}</p>

 <p><b>Hangul Pronunciation:</b>
 ${hangulName}</p>

 <h2>${result.name}</h2>

 <p>${result.meaning}</p>
 `;

 drawCard(
   result.name,
   result.meaning,
   hangulName
 );
}

function drawCard(
 name,
 meaning,
 hangulName
){

 const canvas=document.getElementById("card");

 const ctx=canvas.getContext("2d");

 ctx.fillStyle="#f8f1df";
 ctx.fillRect(
   0,
   0,
   canvas.width,
   canvas.height
 );

 ctx.fillStyle="#222";
 ctx.textAlign="center";

 ctx.font="28px serif";
 ctx.fillText(
   "Korean Name Certificate",
   350,
   60
 );

 ctx.font="24px serif";
 ctx.fillText(
   hangulName,
   350,
   120
 );

 ctx.font="72px serif";
 ctx.fillText(
   name,
   350,
   220
 );

 ctx.font="22px serif";
 ctx.fillText(
   meaning,
   350,
   290
 );

 ctx.font="18px serif";
 ctx.fillText(
   "Welcome to Korea",
   350,
   350
 );
}

</script>

</body>
</html>
