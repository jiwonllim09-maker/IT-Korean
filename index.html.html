<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Korean Name Generator</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:800px;
  margin:30px auto;
  padding:20px;
}

.card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin:8px 0;
}

button{
  cursor:pointer;
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
}

canvas{
  border:1px solid #ccc;
  background:#f8f1df;
  max-width:100%;
  margin-top:15px;
}

.result{
  margin-top:20px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h1>🇰🇷 AI Korean Name Generator</h1>

<input id="name" placeholder="Enter your name (ex. Lydia)">

<button onclick="generateName()">
Generate Korean Name
</button>

<div id="result" class="result"></div>

<canvas id="card" width="700" height="400"></canvas>

</div>

<script>

const GEMINI_API_KEY = "새키"; // ← 여기에 키 넣으면 바로 작동

async function askGemini(name){

  const prompt = `
You are a Korean naming expert.

Input name: ${name}

Task:
1. Convert the name into Korean pronunciation
2. Interpret the meaning or vibe of the name
3. Recommend ONE Korean name that best matches the meaning

Return ONLY valid JSON:

{
  "hangulPronunciation": "",
  "meaning": "",
  "koreanName": "",
  "reason": ""
}
`;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        contents:[
          {
            parts:[
              { text: prompt }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();
  console.log(data);

  try {
    const text = data.candidates[0].content.parts[0].text;
    text = text.replace(/```json/g, "").replace(/```/g, "").trim();
    return JSON.parse(text);
  } catch (e) {
    console.log("Parse error:", data);
    return null;
  }
}

async function generateName(){

  const input = document.getElementById("name").value.trim();
  if(!input){
    alert("Please enter a name");
    return;
  }

  document.getElementById("result").innerHTML = "Generating...";

  const ai = await askGemini(input);

  if(!ai){
    document.getElementById("result").innerHTML = "Error generating name.";
    return;
  }

  document.getElementById("result").innerHTML = `
    <p><b>Input:</b> ${input}</p>
    <p><b>Korean Pronunciation:</b> ${ai.hangulPronunciation}</p>
    <p><b>Meaning:</b> ${ai.meaning}</p>
    <h2>Recommended Korean Name: ${ai.koreanName}</h2>
    <p><b>Reason:</b> ${ai.reason}</p>
  `;

  drawCard(input, ai);
}

function drawCard(input, ai){

  const canvas = document.getElementById("card");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#f8f1df";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.textAlign = "center";

  ctx.font = "28px serif";
  ctx.fillText("AI Korean Name Certificate", 350, 60);

  ctx.font = "22px serif";
  ctx.fillText(input, 350, 120);

  ctx.font = "32px serif";
  ctx.fillText(ai.koreanName, 350, 200);

  ctx.font = "20px serif";
  ctx.fillText(ai.meaning, 350, 280);

  ctx.font = "18px serif";
  ctx.fillText("Generated by AI Naming Engine", 350, 340);
}

</script>

</body>
</html>
