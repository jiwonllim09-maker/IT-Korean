<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Korean Name Generator</title>

<style>
body{
  font-family: Arial;
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:12px;
}

input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h1>🇰🇷 AI Korean Name Generator</h1>

<input id="name" placeholder="Enter your name">

<button onclick="generateName()">Generate</button>

<div id="result" class="result"></div>

</div>

<script>

const WORKER_URL = "https://jiwonllim09.workers.dev";

async function askGemini(name){

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  });

  return await res.json();
}

async function generateName(){

  const input = document.getElementById("name").value.trim();

  if(!input){
    alert("Enter name");
    return;
  }

  document.getElementById("result").innerHTML = "Generating...";

  const ai = await askGemini(input);

  if(!ai || !ai.koreanName){
    document.getElementById("result").innerHTML = "Error (check Worker/API)";
    console.log(ai);
    return;
  }

  document.getElementById("result").innerHTML = `
    <p><b>Name:</b> ${input}</p>
    <p><b>Korean Pronunciation:</b> ${ai.hangulPronunciation}</p>
    <p><b>Meaning:</b> ${ai.meaning}</p>
    <h2>${ai.koreanName}</h2>
    <p>${ai.reason}</p>
  `;
}

</script>

</body>
</html>
