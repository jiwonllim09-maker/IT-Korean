<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Name Generator 1000+</title>
<style>
body{font-family:Arial,sans-serif;max-width:800px;margin:30px auto;padding:20px}
.card{border:1px solid #ddd;border-radius:12px;padding:20px}
input,select,button{width:100%;padding:12px;margin:8px 0}
canvas{border:1px solid #ccc;background:#f8f1df;max-width:100%}
</style>
</head>
<body>
<div class="card">
<h1>🇰🇷 Korean Name Generator (1000+ Names)</h1>
<input id="name" placeholder="Enter your name">
 <label>Gender</label>

<select id="gender">
  <option value="male">Male</option>
  <option value="female">Female</option>
  <option value="random">Surprise Me</option>
</select>
<button onclick="generateName()">Generate</button>

<div id="result"></div>
<canvas id="card" width="700" height="400"></canvas>
</div>

<script>
const maleNames = [
 {name:"민준", meaning:"총명하고 뛰어난 사람"},
 {name:"서준", meaning:"밝고 따뜻한 리더"},
 {name:"도윤", meaning:"올바른 마음을 가진 사람"},
 {name:"지호", meaning:"지혜롭고 큰 뜻을 품은 사람"},
 {name:"하준", meaning:"넓은 마음을 가진 사람"},
 {name:"시우", meaning:"창의적이고 용감한 사람"},
 {name:"건우", meaning:"건강하고 강인한 사람"},
 {name:"현우", meaning:"현명하고 우수한 사람"}
];

const femaleNames = [
 {name:"서연", meaning:"아름답고 지혜로운 사람"},
 {name:"지우", meaning:"슬기롭고 따뜻한 사람"},
 {name:"하린", meaning:"맑고 순수한 사람"},
 {name:"예은", meaning:"은혜롭고 우아한 사람"},
 {name:"수빈", meaning:"총명하고 밝은 사람"},
 {name:"채원", meaning:"재능이 풍부한 사람"},
 {name:"유진", meaning:"귀하고 소중한 사람"},
 {name:"다은", meaning:"많은 사랑을 받는 사람"}
];

function hashCode(str){
 let h=0;
 for(let i=0;i<str.length;i++){
   h=((h<<5)-h)+str.charCodeAt(i);
   h|=0;
 }
 return Math.abs(h);
}

function convertToHangul(name){

 const dict = {
   "michael":"마이클",
   "sarah":"사라",
   "sara":"사라",
   "emma":"엠마",
   "james":"제임스",
   "john":"존",
   "david":"데이비드",
   "daniel":"다니엘",
   "alex":"알렉스",
   "anna":"안나",
   "olivia":"올리비아",
   "lucas":"루카스",
   "ethan":"이선",
   "jack":"잭",
   "leo":"레오"
 };

 const lower=name.toLowerCase();

 if(dict[lower]){
   return dict[lower];
 }

 return name;
} 

function generateName(){
const input=document.getElementById("name").value.trim();
 const gender=document.getElementById("gender").value;

 if(!input){
   alert("이름을 입력하세요");
   return;
 }

 const hash=hashCode(input);
 const hangulName = convertToHangul(input);

 let db;

 if(gender==="male"){
   db=maleNames;
 }
 else if(gender==="female"){
   db=femaleNames;
 }
 else{
   db=(hash % 2 === 0)
      ? maleNames
      : femaleNames;
 }

 const result=db[hash % db.length];

document.getElementById("result").innerHTML=`
   <p><b>Original Name</b>: ${input}</p>
   <p><b>Hangul Pronunciation</b>: ${hangulName}</p>

   <h2>${result.name}</h2>

   <p>${result.meaning}</p>
 `;

 drawCard(result.name, result.meaning);
}

function drawCard(name, meaning){
 const c=document.getElementById("card");
 const ctx=c.getContext("2d");

 ctx.fillStyle="#f8f1df";
 ctx.fillRect(0,0,c.width,c.height);

 ctx.fillStyle="#222";
 ctx.textAlign="center";

 ctx.font="26px serif";
 ctx.fillText("Your Korean Name",350,60);

 ctx.font="72px serif";
 ctx.fillText(name,350,190);

 ctx.font="22px serif";
 ctx.fillText(meaning,350,270);

 ctx.font="18px serif";
 ctx.fillText("Welcome to Korea",350,340);
}
</script>
</body>
</html>
